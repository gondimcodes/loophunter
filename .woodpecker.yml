kind: pipeline
name: test-and-release

steps:
  test:
    image: rust:latest
    commands:
      - cargo test --workspace -j 1
    when:
      event: [push, pull_request]

  build:
    image: rust:latest
    commands:
      - cargo build --release
      - mkdir -p dist
      - cp target/release/loophunter dist/loophunter
      - cd dist
      - tar -czf loophunter-$${CI_COMMIT_TAG}-x86_64-unknown-linux-gnu.tar.gz loophunter
    when:
      event: tag

  publish:
    image: woodpeckerci/plugin-release
    settings:
      api_key:
        from_secret: codeberg_token
      base_url: https://codeberg.org
      files:
        - dist/loophunter-*.tar.gz
    when:
      event: tag
